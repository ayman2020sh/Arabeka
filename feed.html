<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أرابيكا - مجتمع باي</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; resize: none; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .publish-btn { width: 100%; background-color: #6200ee; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .post { background: white; padding: 15px; margin: 10px 0; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-action { background: none; border: none; font-size: 18px; cursor: pointer; margin-left: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>مجتمع أرابيكا</h2>
        <div class="card">
            <textarea id="post-text" rows="3" placeholder="بم تفكر؟"></textarea>
            <input type="text" id="media-url" placeholder="رابط صورة (اختياري)" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
            <button id="publish-btn" class="publish-btn">نشر الآن</button>
        </div>
        <div id="posts-container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARAFggPUeoPr7dmzpi_R_HLVeqobGclzo",
            authDomain: "arabeka-3336c.firebaseapp.com",
            projectId: "arabeka-3336c",
            storageBucket: "arabeka-3336c.firebasestorage.app",
            messagingSenderId: "244460272030",
            appId: "1:244460272030:web:c5aabfd0b396656721fe8f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // النشر مع تهيئة الإعجابات بـ 0
        document.getElementById('publish-btn').onclick = function() {
            const text = document.getElementById('post-text').value;
            const media = document.getElementById('media-url').value;
            if(!text.trim()) return alert("اكتب شيئاً!");
            db.collection("posts").add({ content: text, media: media, likes: 0, timestamp: new Date() });
            document.getElementById('post-text').value = "";
            document.getElementById('media-url').value = "";
        };

        // عرض مع التفاعل
        db.collection("posts").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById('posts-container');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="post">
                        <p>${data.content}</p>
                        ${data.media ? `<img src="${data.media}" style="width:100%; border-radius:10px;" onerror="this.style.display='none'">` : ""}
                        <div style="margin-top:10px;">
                            <button class="btn-action" onclick="likePost('${doc.id}', ${data.likes || 0})">❤️ ${data.likes || 0}</button>
                            <button class="btn-action" onclick="alert('قريباً!')">💬</button>
                            <button class="btn-action" onclick="deletePost('${doc.id}')" style="color:red; font-size:12px;">🗑️</button>
                        </div>
                    </div>`;
            });
        });

        // زيادة الإعجابات
        window.likePost = function(id, currentLikes) {
            db.collection("posts").doc(id).update({ likes: currentLikes + 1 });
        };

        // الحذف
        window.deletePost = function(id) {
            if(confirm("حذف المنشور؟")) db.collection("posts").doc(id).delete();
        };
    </script>
</body>
</html>
