<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرابيكا - مجتمع باي</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; resize: none; font-size: 16px; outline: none; box-sizing: border-box; }
        .publish-btn { width: 100%; background-color: #6200ee; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .post { background: white; padding: 15px; margin: 10px 0; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .action-btns { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-small { background: none; border: none; color: #65676b; cursor: pointer; font-size: 14px; margin-left: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>مجتمع أرابيكا</h2>
        <div class="card">
            <textarea id="post-text" rows="3" placeholder="بم تفكر يا صديقي؟"></textarea>
            <button id="publish-btn" class="publish-btn">نشر الآن</button>
        </div>
        <div id="posts-container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARAFggPUeoPr7dmzpi_R_HLVeqobGclzo",
            authDomain: "arabeka-3336c.firebaseapp.com",
            projectId: "arabeka-3336c",
            storageBucket: "arabeka-3336c.firebasestorage.app",
            messagingSenderId: "244460272030",
            appId: "1:244460272030:web:c5aabfd0b396656721fe8f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // النشر
        document.getElementById('publish-btn').onclick = function() {
            const text = document.getElementById('post-text').value;
            if(!text.trim()) return alert("اكتب شيئاً!");
            db.collection("posts").add({ content: text, timestamp: new Date() });
            document.getElementById('post-text').value = "";
        };

        // عرض المنشورات
        db.collection("posts").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById('posts-container');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="post">
                        <p style="font-size:17px; margin:0;">${data.content}</p>
                        <div class="action-btns">
                            <button class="btn-small">❤️ إعجاب</button>
                            <button class="btn-small">💬 تعليق</button>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
