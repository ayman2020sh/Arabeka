<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مجتمع أرابيكا</title>
</head>
<body>

    <div style="max-width: 500px; margin: auto; padding: 20px;">
        <h2>مجتمع أرابيكا</h2>
        <textarea id="post-text" style="width: 100%; height: 80px;"></textarea>
        <button id="publish-btn" style="width: 100%; padding: 10px; background: blue; color: white;">نشر الآن</button>
        
        <!-- هنا ستظهر المنشورات -->
        <div id="posts-container" style="margin-top: 20px;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARAFggPUeoPr7dmzpi_R_HLVeqobGclzo",
            authDomain: "arabeka-3336c.firebaseapp.com",
            projectId: "arabeka-3336c",
            storageBucket: "arabeka-3336c.firebasestorage.app",
            messagingSenderId: "244460272030",
            appId: "1:244460272030:web:c5aabfd0b396656721fe8f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. وظيفة النشر
        document.getElementById('publish-btn').onclick = function() {
            const text = document.getElementById('post-text').value;
            db.collection("posts").add({ content: text, timestamp: new Date() });
            document.getElementById('post-text').value = "";
        };

        // 2. وظيفة عرض المنشورات (تتحدث تلقائياً!)
        db.collection("posts").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById('posts-container');
            container.innerHTML = ""; // مسح القديم لعرض الجديد
            snapshot.forEach((doc) => {
                container.innerHTML += `<div style="background:#eee; padding:10px; margin:5px; border-radius:5px;">${doc.data().content}</div>`;
            });
        });
    </script>
</body>
</html>
