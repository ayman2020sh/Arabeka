<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر Pi التجريبي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f0fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
            width: 350px;
        }
        h1 { color: #5c2d91; font-size: 24px; }
        .price { font-size: 20px; font-weight: bold; margin: 15px 0; }
        button {
            background-color: #5c2d91;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #4a2275; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { margin-top: 15px; color: #666; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>🛍️ متجر Pi التجريبي</h1>
    <p>☕ قهوة افتراضية</p>
    <div class="price">السعر: 1 Pi</div>
    
    <button id="pay-btn" onclick="startPayment()">🔐 ادفع باستخدام Pi</button>
    <div id="status-msg" class="status">جاري الاتصال بشبكة باي...</div>
</div>

<script>
    // تعديل: تحويل التطبيق للعمل على البيئة الحقيقية لإلغاء قيود الـ Sandbox
    try {
        Pi.init({ version: "2.0", sandbox: false }); 
        console.log("Pi SDK Initialized");
    } catch (e) {
        document.getElementById('status-msg').innerText = "خطأ في تهيئة الحزمة: " + e.message;
    }

    // تسجيل الدخول المباشر
    Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
      .then(function(auth) {
          document.getElementById('status-msg').innerText = "مرحباً بك: " + auth.user.username + " (جاهز للدفع)";
          document.getElementById('status-msg').style.color = "green";
      })
      .catch(function(error) {
          document.getElementById('status-msg').innerText = "يرجى فتح التطبيق من داخل Pi Browser لتفعيل الدفع.";
          document.getElementById('status-msg').style.color = "red";
      });

    function onIncompletePaymentFound(payment) {
        console.log("Found incomplete payment", payment);
    }

    function startPayment() {
        const btn = document.getElementById('pay-btn');
        const status = document.getElementById('status-msg');
        
        btn.disabled = true;
        status.innerText = "جاري فتح محفظتك وإنشاء الطلب...";
        status.style.color = "#5c2d91";

        Pi.createPayment({
            amount: 1,
            memo: "شراء قهوة افتراضية من متجر أرابيكا",
            metadata: { orderId: "12345" },
        }, {
            onReadyForServerApproval: function(paymentId) {
                status.innerText = "جاري تأكيد المعاملة برمجياً مع سيرفر Vercel...";
                
                fetch('/approve-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId: paymentId })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        status.innerText = "تمت الموافقة من السيرفر! جاري إنهاء العملية...";
                    } else {
                        status.innerText = "فشل السيرفر في الاعتماد.";
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    status.innerText = "خطأ في الاتصال بالسيرفر.";
                    btn.disabled = false;
                });
            },
            onReadyForServerCompletion: function(paymentId, txid) {
                status.innerText = "🎉 مبروك! نجحت عملية الدفع.";
                status.style.color = "green";
                btn.disabled = false;
            },
            onCancel: function(paymentId) {
                status.innerText = "تم إلغاء الدفع بواسطة المستخدم.";
                status.style.color = "orange";
                btn.disabled = false;
            },
            onError: function(error, payment) {
                status.innerText = "حدث خطأ: " + error.message;
                status.style.color = "red";
                btn.disabled = false;
            }
        });
    }
</script>

</body>
</html>
