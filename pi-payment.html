<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر Pi - دفع تجريبي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f4f0fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(106, 63, 160, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #4b2b7b;
            margin-bottom: 10px;
        }
        .product {
            font-size: 20px;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(135deg, #7b4fbf, #5c2d91);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-weight: bold;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #5c2d91, #3e1e63);
        }
        #status {
            margin-top: 25px;
            font-size: 16px;
            color: #333;
            min-height: 24px;
        }
        .note {
            font-size: 13px;
            color: #888;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛍️ متجر Pi التجريبي</h1>
        <p class="product">☕ قهوة افتراضية<br><strong>السعر: 1 Pi</strong></p>
        <button id="payBtn" disabled>🔐 ادفع باستخدام Pi</button>
        <p id="status"></p>
        <p class="note">⚠️ هذا تطبيق تجريبي (Sandbox) على شبكة Pi Testnet</p>
    </div>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        let currentPayment = null;

        window.addEventListener('DOMContentLoaded', () => {
            Pi.init({ version: "2.0", sandbox: true });
            document.getElementById('payBtn').disabled = false;
        });

        async function authenticateUser() {
            const scopes = ['username', 'payments', 'wallet_address'];
            try {
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('status').innerText = `مرحباً ${auth.user.username} 👋`;
                return auth;
            } catch (error) {
                document.getElementById('status').innerText = 'فشل المصادقة. أعد المحاولة.';
                return null;
            }
        }

        async function startPayment(auth) {
            const paymentData = {
                amount: 1,
                memo: "شراء قهوة افتراضية ☕",
                metadata: { productId: "coffee_01" },
            };

            try {
                const payment = await Pi.createPayment(paymentData, {
                    onReadyForServerApproval: async (paymentId) => {
                        document.getElementById('status').innerText = '⏳ جاري إرسال الدفعة للسيرفر للموافقة...';
                        
                        // إرسال طلب الموافقة للسيرفر الخلفي الخاص بنا تلقائياً
                        try {
                            const response = await fetch('/approve-payment', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId })
                            });
                            const result = await response.json();
                            if (result.success) {
                                document.getElementById('status').innerText = '⏳ السيرفر وافق، بانتظار شبكة Pi...';
                            }
                        } catch (err) {
                            document.getElementById('status').innerText = '❌ فشل اتصال المتجر بالسيرفر.';
                        }
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        document.getElementById('status').innerText = '✅ تم الدفع بنجاح ومكتمل!';
                        console.log('الدفع مكتمل:', paymentId, txid);
                    },
                    onCancel: (paymentId) => {
                        document.getElementById('status').innerText = '❌ ألغيت الدفع.';
                    },
                    onError: (error, payment) => {
                        document.getElementById('status').innerText = '⚠️ حدث خطأ أثناء الدفع.';
                        console.error(error);
                    },
                });
                currentPayment = payment;
            } catch (error) {
                document.getElementById('status').innerText = 'تعذر بدء الدفع.';
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log('دفعة غير مكتملة وجِدت:', payment);
        }

        document.getElementById('payBtn').addEventListener('click', async () => {
            const auth = await authenticateUser();
            if (auth) {
                await startPayment(auth);
            }
        });
    </script>
</body>
</html>
