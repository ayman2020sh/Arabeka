<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة دفع تطبيق Arabeka</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f9fa;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: #6200ee;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover {
            background-color: #4b00b5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>بوابة دفع تطبيق Arabeka</h2>
        <p>اضغط على الزر بالأسفل لإتمام عملية الشراء بقيمة Pi 1.25</p>
        <button id="pay-button">ادفع باستخدام Pi</button>
    </div>

    <script>
        const BASE_URL = "https://arabeka.vercel.app";

        try {
            Pi.init({ version: "2.0", sandbox: true });
        } catch(e) {
            alert("فشل تهيئة SDK: " + e.message);
        }

        document.getElementById('pay-button').addEventListener('click', function() {
            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
            .then(function(auth) {
                
                return Pi.createPayment({
                  amount: 1.25,
                  memo: "شراء من تطبيق أرابيكا",
                  metadata: { auth: "arabeka" },
                }, {
                  onReadyForServerApproval: function(paymentId) {
                    fetch(`${BASE_URL}/api/approve`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ paymentId: paymentId })
                    });
                  },
                  onReadyForServerCompletion: function(paymentId, txid) {
                    fetch(`${BASE_URL}/api/complete`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(data => alert("تم الدفع بنجاح كامل!"));
                  },
                  onCancel: function(paymentId) {},
                  onError: function(error, paymentId) {
                    alert("خطأ الشبكة: " + error.message);
                  }
                });
            })
            .catch(function(error) {
                alert("فشل التوثيق: " + error.message);
            });
        });

        // ⭐ دالة فحص التسوية التفصيلية لمعرفة رد السيرفر الحقيقي
        function onIncompletePaymentFound(payment) {
          alert("تم رصد معاملة معلقة برقم: " + payment.id + " .. جاري إرسالها للسيرفر للتسوية.");
          
          fetch(`${BASE_URL}/api/complete`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId: payment.id, txid: payment.txid })
          })
          .then(async response => {
             const data = await response.json();
             if (response.ok) {
                 alert("السيرفر نجح في التسوية! الرد: " + JSON.stringify(data));
             } else {
                 alert("السيرفر رفض التسوية! السبب: " + JSON.stringify(data));
             }
          })
          .catch(err => {
             alert("فشل الاتصال بالسيرفر تماماً: " + err.message);
          });
        }
    </script>
</body>
</html>
