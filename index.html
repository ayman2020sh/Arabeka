<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة دفع تطبيق Arabeka</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f7f9fa;
            padding: 20px 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        button {
            background-color: #6200ee;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
        }
        button:hover {
            background-color: #4b00b5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>بوابة دفع تطبيق Arabeka</h2>
        <p>اضغط على الزر بالأسفل لإتمام عملية الشراء بقيمة Pi 1.25</p>
        <button id="pay-button">ادفع باستخدام Pi</button>

        <div style="background-color: #ffffff; border-radius: 12px; padding: 15px; margin-top: 25px; border: 1px solid #eaeaea; text-align: right;">
            
            <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #f3f3f3; padding-bottom: 10px; margin-bottom: 15px;">
                <div>
                    <span style="color: #666; font-size: 13px;">👤 الحساب:</span>
                    <strong id="username-display" style="color: #111; font-size: 14px;">جاري التحميل...</strong>
                </div>
                <div>
                    <span style="color: #666; font-size: 13px;">💰 الرصيد:</span>
                    <strong id="balance-display" style="color: #6200ee; font-size: 14px;">0 Pi</strong>
                </div>
            </div>

            <h3 style="color: #6200ee; font-size: 15px; margin-top: 0; margin-bottom: 12px;">⏱️ سجل المعاملات الأخيرة</h3>
            
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: center; font-size: 12px;">
                    <thead>
                        <tr style="background-color: #f8f9fa; border-bottom: 1px solid #ddd;">
                            <th style="padding: 8px; color: #555;">الخدمة</th>
                            <th style="padding: 8px; color: #555;">المبلغ</th>
                            <th style="padding: 8px; color: #555;">الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <tr id="no-transactions">
                            <td colspan="3" style="padding: 15px; color: #999; font-style: italic;">لا توجد معاملات مسجلة بعد</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const BASE_URL = "https://arabeka.vercel.app";

        try {
            Pi.init({ version: "2.0", sandbox: true });
        } catch(e) {
            console.error("فشل تهيئة SDK: " + e.message);
        }

        // 🔄 دالة لتحديث واجهة المستخدم وقراءة المعاملات المحفوظة
        function updateDashboard(username) {
            if (username) {
                document.getElementById('username-display').innerText = username;
            }
            
            // جلب المعاملات المخزنة في ذاكرة المتصفح المحلية
            const savedTx = localStorage.getItem('arabeka_tx');
            if (savedTx) {
                const txData = JSON.parse(savedTx);
                document.getElementById('balance-display').innerText = txData.amount + " Pi";
                
                const tableBody = document.getElementById('transactions-body');
                tableBody.innerHTML = `
                    <tr>
                        <td style="padding: 8px; border-bottom: 1px solid #eee;">شحن رصيد أرابيكا</td>
                        <td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold; color: #6200ee;">${txData.amount} Pi</td>
                        <td style="padding: 8px; border-bottom: 1px solid #eee; color: green; font-weight: bold;">🟢 مكتملة</td>
                    </tr>
                `;
            }
        }

        // التوثيق التلقائي فور فتح التطبيق لعرض اسم المستخدم فوراً
        Pi.authenticate(['username'], onIncompletePaymentFound)
        .then(function(auth) {
            updateDashboard(auth.user.username);
        }).catch(function(err) {
            document.getElementById('username-display').innerText = "زائر مجهول";
        });

        document.getElementById('pay-button').addEventListener('click', function() {
            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
            .then(function(auth) {
                updateDashboard(auth.user.username);
                
                return Pi.createPayment({
                  amount: 1.25,
                  memo: "شراء من تطبيق أرابيكا",
                  metadata: { auth: "arabeka" },
                }, {
                  onReadyForServerApproval: function(paymentId) {
                    fetch(`${BASE_URL}/api/approve`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ paymentId: paymentId })
                    });
                  },
                  onReadyForServerCompletion: function(paymentId, txid) {
                    fetch(`${BASE_URL}/api/complete`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(data => {
                        // 💾 حفظ العملية برمجياً في الذاكرة لتظهر بالجدول فوراً
                        localStorage.setItem('arabeka_tx', JSON.stringify({ amount: 1.25, id: paymentId }));
                        updateDashboard(auth.user.username);
                        alert("تم الدفع بنجاح كامل!");
                    });
                  },
                  onCancel: function(paymentId) {},
                  onError: function(error, paymentId) {
                    alert("خطأ الشبكة: " + error.message);
                  }
                });
            })
            .catch(function(error) {
                alert("فشل التوثيق: " + error.message);
            });
        });

        function onIncompletePaymentFound(payment) {
          const actualPaymentId = payment.id || payment.identifier;
          const actualTxid = payment.txid || (payment.transaction ? payment.transaction.txid : null);

          if (!actualPaymentId) {
              return;
          }
          
          fetch(`${BASE_URL}/api/complete`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId: actualPaymentId, txid: actualTxid })
          })
          .then(async response => {
             if (response.ok) {
                 localStorage.setItem('arabeka_tx', JSON.stringify({ amount: 1.25, id: actualPaymentId }));
                 alert("تم تسوية المعاملة المعلقة!");
                 location.reload(); // إعادة تحميل الصفحة لتحديث الجدول
             }
          })
          .catch(err => console.error(err));
        }
    </script>
</body>
</html>
