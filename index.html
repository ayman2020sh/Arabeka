<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة دفع تطبيق Arabeka</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f9fa;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: #6200ee;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover {
            background-color: #4b00b5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>بوابة دفع تطبيق Arabeka</h2>
        <p>اضغط على الزر بالأسفل لإتمام عملية الشراء بقيمة Pi 1.25</p>
        
        <button id="pay-button">ادفع باستخدام Pi</button>
    </div>

    <script>
        // 1️⃣ تهيئة الـ SDK الخاص بـ Pi للشبكة التجريبية
        try {
            Pi.init({ version: "2.0", sandbox: true });
        } catch(e) {
            console.error("فشل تهيئة SDK:", e);
        }

        // 2️⃣ عند الضغط على الزر: يتم التوثيق أولاً بالصلاحيات الكاملة ثم فتح الدفع مباشرة
        document.getElementById('pay-button').addEventListener('click', function() {
            
            // طلب التوثيق للحساب والمدفوعات فوراً مع ربطها بمعالج المعاملات المعلقة
            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
            .then(function(auth) {
                console.log("تم التوثيق بنجاح وصلاحية الدفع جاهزة:", auth.user.username);
                
                // تشغيل عملية الدفع بعد تأكيد الصلاحية (Scope) مباشرة
                return Pi.createPayment({
                  amount: 1.25,
                  memo: "شراء من تطبيق أرابيكا",
                  metadata: { auth: "arabeka" },
                }, {
                  onReadyForServerApproval: function(paymentId) {
                    fetch('/api/approve', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ paymentId: paymentId })
                    })
                    .then(response => response.json())
                    .then(data => console.log("Approved:", data))
                    .catch(err => console.error("Approval error:", err));
                  },

                  onReadyForServerCompletion: function(paymentId, txid) {
                    fetch('/api/complete', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    })
                    .then(response => response.json())
                    .then(data => {
                       alert("تمت عملية الدفع بنجاح كامل!");
                    })
                    .catch(err => console.error("Completion error:", err));
                  },

                  onCancel: function(paymentId) {
                    console.log("Canceled:", paymentId);
                  },

                  onError: function(error, paymentId) {
                    console.error("Error:", error);
                    alert("حدث خطأ أثناء الاتصال بالمحفظة: " + error.message);
                  }
                });
            })
            .catch(function(error) {
                alert("فشل التوثيق أو رفض الصلاحية: " + error.message);
            });
        });

        // 3️⃣ معالجة وتصفية المعاملات المعلقة السابقة تلقائياً
        function onIncompletePaymentFound(payment) {
          console.log("وجد معاملة معلقة، يتم إغلاقها الآن بالخلفية...", payment.id);
          
          fetch('/api/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId: payment.id, txid: payment.txid })
          })
          .then(response => response.json())
          .then(data => {
             alert("تمت تسوية المعاملة المعلقة السابقة بنجاح! يمكنك الآن إعادة الضغط على الزر مجدداً لإكمال فحص الخطوة العاشرة.");
          })
          .catch(err => console.error("Incomplete payment error:", err));
        }
    </script>
</body>
</html>
