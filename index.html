<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرابيكا - مجتمع باي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        /* الألوان والهوية والوضع الليلي */
        :root { --bg: #c5a059; --card: #ffffff; --text: #3f1b62; --accent: #3f1b62; --light-bg: #f9f9f9; --gold: #ffd700; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; --light-bg: #2c2c2c; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; transition: background-color 0.3s; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; position: relative; }
        
        /* الشريط العلوي */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .top-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); }
        h2 { margin: 0; color: var(--accent); font-size: 24px; text-align: center; flex-grow: 1; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        /* الإشعارات */
        .notification-badge { background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; font-weight: bold; position: absolute; top: 15px; right: 45px; display: none; }
        .notifications-panel { display: none; background: var(--card); border: 1px solid var(--accent); padding: 10px; border-radius: 10px; margin-bottom: 15px; max-height: 150px; overflow-y: auto; font-size: 14px; }
        .notif-item { border-bottom: 1px solid #ddd; padding: 5px 0; }
        
        /* الملف الشخصي والمحفظة */
        .profile-panel { display: none; background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 10px; }
        .profile-stat { font-weight: bold; color: var(--accent); }
        .bio-input { width: 100%; padding: 8px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; background: var(--light-bg); color: var(--text); box-sizing: border-box; }
        
        .wallet-box { background: var(--light-bg); padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed var(--accent); }
        .wallet-btn { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .shop-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        
        /* المنشورات والتصويت */
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .post { background: var(--card); padding: 15px; margin-bottom: 15px; border-radius: 15px; border-right: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post-header { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 10px; }
        .post-avatar { width: 30px; height: 30px; border-radius: 50%; margin-left: 10px; object-fit: cover; }
        
        textarea, input[type="text"] { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 15px; margin-bottom: 10px; box-sizing: border-box; background: var(--card); color: var(--text); }
        .publish-btn { width: 100%; background-color: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-action { background: var(--accent); color: #fff; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: 5px; margin-top: 5px; }
        
        /* أشرطة التصويت */
        .poll-option { display: flex; align-items: center; margin-bottom: 5px; cursor: pointer; background: var(--light-bg); border-radius: 5px; overflow: hidden; position: relative; padding: 8px; }
        .poll-bar { position: absolute; left: 0; top: 0; height: 100%; background: rgba(63, 27, 98, 0.2); z-index: 1; transition: width 0.3s; }
        .poll-text { z-index: 2; position: relative; font-size: 14px; flex-grow: 1; font-weight: bold; }
        
        /* التعليقات */
        .comments-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; display: none; }
        .comment { background: var(--light-bg); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; }
        .comment-input-area { display: flex; gap: 5px; margin-top: 10px; }
        .comment-btn { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="top-btn" onclick="toggleTheme()" title="تغيير المظهر">🌙</button>
            <h2>أرابيكا ☕</h2>
            <div style="position: relative;">
                <button class="top-btn" id="bell-btn" style="display:none;" onclick="toggleNotifications()">🔔</button>
                <span id="notif-badge" class="notification-badge">0</span>
            </div>
            <button class="top-btn" id="profile-btn" style="display:none;" onclick="toggleProfile()">👤</button>
        </div>

        <button id="login-btn" class="publish-btn" style="background:#28a745; margin-bottom:20px;">تسجيل الدخول بحساب Pi</button>
        <div id="debug-log" style="color:red; text-align:center; font-size:12px;"></div>

        <div id="notifications-panel" class="notifications-panel">
            <h4 style="margin:0 0 10px 0;">الإشعارات</h4>
            <div id="notif-list">لا توجد إشعارات جديدة.</div>
        </div>

        <div id="profile-panel" class="profile-panel">
            <img id="prof-img-display" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar-img">
            <h3 style="margin-top:0;">الملف الشخصي: <span id="prof-name" class="profile-stat"></span></h3>
            <p style="font-size: 13px;">تاريخ الانضمام: <span id="prof-date" class="profile-stat">-</span> | منشورات: <span id="prof-posts" class="profile-stat">0</span></p>
            
            <input type="text" id="prof-avatar-input" class="bio-input" placeholder="رابط صورتك الشخصية (URL)">
            <textarea id="prof-bio" class="bio-input" rows="2" placeholder="اكتب نبذة عنك..."></textarea>
            <button class="btn-action" onclick="saveProfile()" style="width:100%; margin-top:10px;">حفظ البيانات</button>

            <div class="wallet-box">
                <h4 style="margin: 0 0 10px 0; color: var(--accent);">محفظة أرابيكا الداخلية 💰</h4>
                <p>رصيدك: <b id="wallet-balance" style="font-size: 18px;">0</b> Pi</p>
                <p>نقاط الولاء: <b id="loyalty-points" style="font-size: 18px; color: var(--gold);">0</b> 🌟</p>
                
                <hr style="border: 0.5px solid #ddd; margin: 10px 0;">
                <button class="wallet-btn" onclick="simulateDeposit()">إيداع (محاكاة)</button>
                <button class="wallet-btn" style="background:#d93025;" onclick="alert('خاصية السحب تتطلب موافقة الإدارة وتكامل مع الخادم.')">سحب</button>
                <br>
                <button class="shop-btn" onclick="buyCoffee()">شراء قهوة (1 Pi) = 1 نقطة ولاء</button>
            </div>
        </div>

        <div class="card" id="post-section" style="display: none;">
            <textarea id="post-text" rows="3" placeholder="بم تفكر يا بطل أرابيكا؟"></textarea>
            <input type="text" id="media-url" placeholder="رابط صورة (اختياري)">
            
            <div style="margin-bottom: 10px;">
                <label style="font-size: 14px; cursor: pointer; font-weight:bold;">
                    <input type="checkbox" id="is-poll" onchange="togglePollInputs()"> إضافة تصويت 📊
                </label>
            </div>
            <div id="poll-inputs" style="display:none; background: var(--light-bg); padding:10px; border-radius:10px; margin-bottom:10px;">
                <input type="text" id="poll-opt-1" placeholder="الخيار الأول (مثال: صعود)">
                <input type="text" id="poll-opt-2" placeholder="الخيار الثاني (مثال: هبوط)">
            </div>
            
            <button id="publish-btn" class="publish-btn">نشر</button>
        </div>
        
        <div id="posts-container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // --- 1. إعدادات قواعد البيانات ---
        const firebaseConfig = {
            apiKey: "AIzaSyARAFggPUeoPr7dmzpi_R_HLVeqobGclzo",
            authDomain: "arabeka-3336c.firebaseapp.com",
            projectId: "arabeka-3336c",
            storageBucket: "arabeka-3336c.firebasestorage.app",
            messagingSenderId: "244460272030",
            appId: "1:244460272030:web:c5aabfd0b396656721fe8f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;
        let currentUserAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        let currentBalance = 0;

        // --- 2. دوال الواجهة الأساسية ---
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function toggleProfile() { 
            const p = document.getElementById('profile-panel'); 
            p.style.display = p.style.display === 'block' ? 'none' : 'block'; 
        }
        function toggleNotifications() { 
            const n = document.getElementById('notifications-panel'); 
            n.style.display = n.style.display === 'block' ? 'none' : 'block';
            document.getElementById('notif-badge').style.display = 'none';
        }
        function togglePollInputs() {
            const isPoll = document.getElementById('is-poll').checked;
            document.getElementById('poll-inputs').style.display = isPoll ? 'block' : 'none';
        }
        function toggleComments(postId) {
            const sec = document.getElementById('comments-' + postId);
            sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
        }

        // --- 3. تهيئة Pi SDK وتسجيل الدخول ---
        window.onload = () => { if (typeof Pi !== 'undefined') Pi.init({ version: "2.0", sandbox: true }); };

        document.getElementById('login-btn').onclick = () => {
            const btn = document.getElementById('login-btn');
            btn.innerText = "جاري الاتصال...";
            Pi.authenticate(['username'], () => {}).then(auth => {
                currentUser = auth.user.username;
                btn.style.display = 'none';
                document.getElementById('post-section').style.display = 'block';
                document.getElementById('profile-btn').style.display = 'inline-block';
                document.getElementById('bell-btn').style.display = 'inline-block';
                
                initUserProfile();
                listenToNotifications();
            }).catch(err => { document.getElementById('debug-log').innerText = "خطأ الاتصال: " + err.message; });
        };

        // --- 4. نظام الملف الشخصي والمحفظة والولاء ---
        function initUserProfile() {
            document.getElementById('prof-name').innerText = "@" + currentUser;
            const userRef = db.collection("users").doc(currentUser);
            
            // الاستماع المباشر لتحديثات المستخدم (المحفظة، الصورة، النبذة)
            userRef.onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('prof-bio').value = data.bio || "";
                    document.getElementById('prof-date').innerText = data.joinDate || new Date().toLocaleDateString('ar-EG');
                    
                    if(data.avatar) {
                        currentUserAvatar = data.avatar;
                        document.getElementById('prof-img-display').src = data.avatar;
                        document.getElementById('prof-avatar-input').value = data.avatar;
                    }
                    
                    currentBalance = data.walletBalance || 0;
                    document.getElementById('wallet-balance').innerText = currentBalance;
                    document.getElementById('loyalty-points').innerText = data.loyaltyPoints || 0;
                } else {
                    // إنشاء ملف جديد للمستخدم الأول مرة
                    userRef.set({ bio: "", avatar: "", walletBalance: 0, loyaltyPoints: 0, joinDate: new Date().toLocaleDateString('ar-EG') });
                }
            });

            // حساب عدد المنشورات
            db.collection("posts").where("user", "==", currentUser).onSnapshot(snap => {
                document.getElementById('prof-posts').innerText = snap.size;
            });
        }

        // حفظ الصورة والنبذة
        window.saveProfile = () => {
            const bio = document.getElementById('prof-bio').value;
            const avatar = document.getElementById('prof-avatar-input').value;
            db.collection("users").doc(currentUser).set({ bio: bio, avatar: avatar }, { merge: true })
              .then(() => alert("تم حفظ البيانات بنجاح!"));
        };

        // محاكاة إيداع عملات داخل التطبيق
        window.simulateDeposit = () => {
            db.collection("users").doc(currentUser).set({ 
                walletBalance: firebase.firestore.FieldValue.increment(10) 
            }, { merge: true }).then(() => alert("تم إيداع 10 Pi تجريبي في محفظتك بنجاح!"));
        };

        // نظام المشتريات ونقاط الولاء
        window.buyCoffee = () => {
            if(currentBalance >= 1) {
                db.collection("users").doc(currentUser).set({ 
                    walletBalance: firebase.firestore.FieldValue.increment(-1),
                    loyaltyPoints: firebase.firestore.FieldValue.increment(1)
                }, { merge: true }).then(() => alert("تم شراء القهوة! استمتع بها، لقد حصلت على 1 نقطة ولاء 🌟"));
            } else {
                alert("رصيدك غير كافٍ. يرجى الإيداع أولاً.");
            }
        };

        // --- 5. الإشعارات ---
        function listenToNotifications() {
            db.collection("notifications").where("toUser", "==", currentUser).orderBy("timestamp", "desc").limit(10).onSnapshot(snap => {
                const list = document.getElementById('notif-list');
                list.innerHTML = "";
                let newCount = 0;
                snap.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `<div class="notif-item">👍 قام <b>@${data.fromUser}</b> بالإعجاب بمنشورك.</div>`;
                    newCount++;
                });
                if(newCount > 0) {
                    document.getElementById('notif-badge').style.display = 'block';
                    document.getElementById('notif-badge').innerText = newCount;
                }
            });
        }

        // --- 6. النشر (نصوص + تصويت + صورة المستخدم) ---
        document.getElementById('publish-btn').onclick = () => {
            const text = document.getElementById('post-text').value;
            const media = document.getElementById('media-url').value;
            const isPoll = document.getElementById('is-poll').checked;
            const opt1 = document.getElementById('poll-opt-1').value;
            const opt2 = document.getElementById('poll-opt-2').value;

            if(!text.trim()) return alert("اكتب شيئاً!");
            
            let postData = {
                content: text, user: currentUser, userAvatar: currentUserAvatar, likes: 0, media: media, comments: [], timestamp: firebase.firestore.FieldValue.serverTimestamp(), isPoll: isPoll
            };

            if(isPoll && opt1 && opt2) {
                postData.pollData = { [opt1]: 0, [opt2]: 0, totalVotes: 0, votedUsers: [] };
            }

            db.collection("posts").add(postData);
            
            document.getElementById('post-text').value = "";
            document.getElementById('media-url').value = "";
            document.getElementById('is-poll').checked = false;
            togglePollInputs();
        };

        // --- 7. جلب وعرض المنشورات ---
        db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('posts-container');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const time = d.timestamp ? d.timestamp.toDate().toLocaleDateString('ar-EG') : "";
                const avatar = d.userAvatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                
                // تجهيز واجهة التصويت إن وجدت
                let pollHtml = "";
                if(d.isPoll && d.pollData) {
                    const total = d.pollData.totalVotes || 1; 
                    pollHtml = `<div style="margin: 15px 0;">`;
                    for(const [option, votes] of Object.entries(d.pollData)) {
                        if(option === 'totalVotes' || option === 'votedUsers') continue;
                        const percent = Math.round((votes / total) * 100);
                        pollHtml += `
                        <div class="poll-option" onclick="vote('${doc.id}', '${option}', '${d.pollData.votedUsers || []}')">
                            <div class="poll-bar" style="width: ${percent}%"></div>
                            <span class="poll-text">${option} <small>(${percent}%)</small></span>
                        </div>`;
                    }
                    pollHtml += `</div>`;
                }

                // تجهيز التعليقات
                let commentsHtml = "";
                (d.comments || []).forEach(c => { commentsHtml += `<div class="comment"><b>@${c.user}</b>: ${c.text}</div>`; });

                container.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <div style="display:flex; align-items:center;">
                                <img src="${avatar}" class="post-avatar">
                                <b>@${d.user}</b>
                            </div>
                            <span>${time}</span>
                        </div>
                        <p style="margin: 5px 0 15px 0; font-size:16px;">${d.content}</p>
                        ${d.media ? `<img src="${d.media}" style="width:100%; border-radius:10px; margin-bottom:10px;">` : ""}
                        
                        ${pollHtml}

                        <div style="border-top: 1px solid #eee; padding-top: 10px;">
                            <button class="btn-action" onclick="likePost('${doc.id}', ${d.likes || 0}, '${d.user}')">❤️ ${d.likes || 0}</button>
                            <button class="btn-action" style="background:#555;" onclick="toggleComments('${doc.id}')">💬 ${(d.comments || []).length}</button>
                            ${d.user === currentUser ? `<button class="btn-action" style="background:#d93025; float:left;" onclick="deletePost('${doc.id}')">حذف</button>` : ""}
                        </div>

                        <div id="comments-${doc.id}" class="comments-section">
                            ${commentsHtml}
                            <div class="comment-input-area">
                                <input type="text" id="comment-input-${doc.id}" placeholder="اكتب تعليقاً..." style="margin:0;">
                                <button class="comment-btn" onclick="addComment('${doc.id}')">إرسال</button>
                            </div>
                        </div>
                    </div>`;
            });
        });

        // --- 8. دوال التفاعل (الإعجاب، التعليق، التصويت، الحذف) ---
        window.likePost = (id, likes, postOwner) => {
            db.collection("posts").doc(id).update({ likes: likes + 1 });
            if(postOwner !== currentUser) { 
                db.collection("notifications").add({ toUser: postOwner, fromUser: currentUser, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            }
        };

        window.addComment = (id) => {
            const input = document.getElementById(`comment-input-${id}`);
            if(!input.value.trim() || !currentUser) return;
            const newComment = { user: currentUser, text: input.value };
            db.collection("posts").doc(id).update({ comments: firebase.firestore.FieldValue.arrayUnion(newComment) });
            input.value = "";
        };

        window.vote = (id, option, votedUsersStr) => {
            if(!currentUser) return alert("سجل دخولك أولاً!");
            if(votedUsersStr.includes(currentUser)) return alert("لقد قمت بالتصويت مسبقاً!");
            
            const postRef = db.collection("posts").doc(id);
            postRef.get().then(doc => {
                let pd = doc.data().pollData;
                pd[option] += 1;
                pd.totalVotes += 1;
                if(!pd.votedUsers) pd.votedUsers = [];
                pd.votedUsers.push(currentUser);
                postRef.update({ pollData: pd });
            });
        };

        window.deletePost = (id) => { if(confirm("هل أنت متأكد من حذف المنشور؟")) db.collection("posts").doc(id).delete(); };
    </script>
</body>
</html>
