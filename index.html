<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أرابيكا - تطبيق متكامل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #c5a059; margin: 0; padding-bottom: 80px; }
        .nav-bar { background: #3f1b62; color: white; padding: 15px; text-align: center; }
        .section { padding: 15px; display: none; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #3f1b62; display: flex; justify-content: space-around; padding: 10px 0; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-bar">أرابيكا ☕</div>

<div id="login-section" class="section active" style="text-align:center; padding-top:50px;">
    <button id="pi-login-btn" style="padding:15px; font-size:18px;">تسجيل الدخول بـ Pi</button>
</div>

<div id="app-content" class="hidden">
    <div id="feed-section" class="section">
        <h3>المجتمع</h3>
        <textarea id="post-text"></textarea>
        <button onclick="addPost()">نشر</button>
        <div id="posts-container"></div>
    </div>
    <div id="store-section" class="section">
        <h3>المتجر</h3>
        <div id="store-container"></div>
    </div>
</div>

<div class="bottom-nav">
    <div onclick="showSection('feed-section')">🏠 المجتمع</div>
    <div onclick="showSection('store-section')">🛒 المتجر</div>
</div>

<script>
    // 1. التهيئة
    const firebaseConfig = {
        apiKey: "AIzaSyARAFggPUeoPr7dmzpi_R_HLVeqobGclzo",
        authDomain: "arabeka-3336c.firebaseapp.com",
        projectId: "arabeka-3336c",
        storageBucket: "arabeka-3336c.firebasestorage.app",
        messagingSenderId: "244460272030",
        appId: "1:244460272030:web:c5aabfd0b396656721fe8f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. تسجيل الدخول بـ Pi
    window.onload = () => { Pi.init({ version: "2.0", sandbox: true }); };
    document.getElementById('pi-login-btn').onclick = () => {
        Pi.authenticate(['username'], () => {}).then(auth => {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').classList.remove('hidden');
            showSection('feed-section');
        });
    };

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // 3. جلب البيانات
    db.collection("posts").onSnapshot(snap => {
        const cont = document.getElementById('posts-container');
        cont.innerHTML = "";
        snap.forEach(doc => { cont.innerHTML += `<div class="card">${doc.data().content}</div>`; });
    });
    
    db.collection("products").onSnapshot(snap => {
        const cont = document.getElementById('store-container');
        cont.innerHTML = "";
        snap.forEach(doc => { 
            const p = doc.data();
            cont.innerHTML += `<div class="card"><b>${p.name}</b><br>السعر: ${p.price} Pi</div>`; 
        });
    });

    function addPost() {
        const text = document.getElementById('post-text').value;
        if(text) db.collection("posts").add({ content: text });
    }
</script>
</body>
</html>
