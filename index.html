<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرابيكا - تطبيق المجتمع والمتجر</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #c5a059; --accent: #3f1b62; --card: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--accent); margin: 0; padding-bottom: 70px; }
        .top-bar { background: var(--accent); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .content { padding: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--accent); display: flex; justify-content: space-around; padding: 10px 0; color: white; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; }
        .hidden { display: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div class="top-bar">أرابيكا ☕</div>

<div class="content">
    <div id="view-feed" class="view">
        <h3>المجتمع</h3>
        <textarea id="post-input" style="width:100%;" placeholder="ماذا يدور في ذهنك؟"></textarea>
        <button class="btn" onclick="addPost()">نشر في المجتمع</button>
        <div id="feed-container"></div>
    </div>
    
    <div id="view-store" class="view hidden">
        <h3>المتجر</h3>
        <div id="store-container"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="switchView('feed')">🏠<br>المجتمع</div>
    <div class="nav-item" onclick="switchView('store')">🛒<br>المتجر</div>
</div>

<script>
    // بياناتك الخاصة
    const firebaseConfig = {
        apiKey: "AIzaSyARAFggPUeoPr7dmzpi_R_HLVeqobGclzo",
        authDomain: "arabeka-3336c.firebaseapp.com",
        projectId: "arabeka-3336c",
        storageBucket: "arabeka-3336c.firebasestorage.app",
        messagingSenderId: "244460272030",
        appId: "1:244460272030:web:c5aabfd0b396656721fe8f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function switchView(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
    }

    function addPost() {
        const text = document.getElementById('post-input').value;
        db.collection("posts").add({ content: text, timestamp: new Date() });
        document.getElementById('post-input').value = "";
    }

    // عرض المنشورات لحظياً
    db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
        const container = document.getElementById('feed-container');
        container.innerHTML = "";
        snap.forEach(doc => {
            container.innerHTML += `<div class="card">${doc.data().content}</div>`;
        });
    });
</script>
</body>
</html>
