<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة دفع أرابيكا</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .btn { background-color: #6200ee; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #3700b3; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>بوابة دفع تطبيق Arabeka</h2>
    <p>اضغط على الزر بالأسفل لإتمام عملية الشراء بقيمة 1.25 Pi</p>
    <button class="btn" onclick="startPayment()">ادفع باستخدام Pi</button>
    <div id="status">جاري تهيئة الاتصال بشبكة Pi...</div>

    <script>
        // التهيئة في وضع الاختبار المتوافق مع حسابك (sandbox: true)
        Pi.init({ version: "2.0", sandbox: true });

        Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
        .then(function(auth) {
            document.getElementById('status').innerHTML = "<span class='success'>مرحباً بك: " + auth.user.username + "</span>";
        })
        .catch(function(error) {
            console.error(error);
            document.getElementById('status').innerHTML = "<span class='error'>برجاء فتح الموقع من داخل تطبيق Pi Browser</span>";
        });

        function startPayment() {
            document.getElementById('status').innerText = "جاري فتح المحفظة...";
            Pi.createPayment({
                amount: 1.25,
                memo: "شراء منتج من تطبيق أرابيكا",
                metadata: { orderId: "Arabeka_" + Math.floor(Math.random() * 10000) }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    fetch('/api/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId })
                    }).then(res => res.json()).then(data => {
                        document.getElementById('status').innerText = "في انتظار تأكيدك من المحفظة...";
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    }).then(res => res.json()).then(data => {
                        document.getElementById('status').innerHTML = "<span class='success'>🎉 تم الدفع بنجاح!</span>";
                    });
                },
                onCancel: function(paymentId) {
                    document.getElementById('status').innerText = "تم الإلغاء بواسطة المستخدم.";
                },
                onError: function(error, paymentId) {
                    document.getElementById('status').innerHTML = "<span class='error'>حدث خطأ: " + error.message + "</span>";
                }
            });
        }

        function onIncompletePaymentFound(payment) {
            fetch('/api/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, txid: payment.txid })
            });
        }
    </script>
</body>
</html>
